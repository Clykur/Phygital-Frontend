kind = "web"
previewPath = "/"
title = "Phygital Student Library Network"
version = "1.0.0"
id = "artifacts/phygital-library"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24431

[services.development]
run = "pnpm --filter @workspace/phygital-library run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phygital-library", "run", "build" ]
publicDir = "artifacts/phygital-library/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24431"
BASE_PATH = "/"
